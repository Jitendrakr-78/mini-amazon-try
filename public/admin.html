<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Admin Panel - Inventory</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header><h1>Admin Control Center</h1><nav><a href="index.html">View Store</a></nav></header>
    <main style="padding:20px;">
        <div class="admin-form">
            <h3>Add New Product</h3>
            <input type="text" id="title" placeholder="Product Title" style="width:95%; margin-bottom:10px; padding:5px;"><br>
            <textarea id="desc" placeholder="Description" style="width:95%; margin-bottom:10px; padding:5px;"></textarea><br>
            <input type="number" id="price" placeholder="Price" style="width:45%; margin-bottom:10px; padding:5px;">
            <input type="number" id="stock" placeholder="Stock" style="width:45%; margin-bottom:10px; padding:5px;"><br>
            <input type="text" id="image" placeholder="Image URL" style="width:95%; margin-bottom:15px; padding:5px;"><br>
            <button onclick="addProduct()">Save Product to Cloud</button>
        </div>

        <h2 style="text-align:center;">Current Live Inventory</h2>
        <div id="admin-product-list" style="max-width:800px; margin:auto;"></div>
    </main>

    <script>
        //const API_URL = "https://your-backend-render-url.onrender.com/api/products";
        const API_URL = "https://mini-amazon-1vlq.onrender.com/api/products";
        const token = localStorage.getItem('token');

        if(localStorage.getItem('role') !== 'admin') {
            alert("Unauthorized access!");
            window.location.href = 'index.html';
        }

        async function loadAdminProducts() {
            const res = await fetch(API_URL);
            const products = await res.json();
            let html = '';
            products.forEach(p => {
                html += `
                    <div class="cart-item" style="display:flex; justify-content:space-between; align-items:center;">
                        <p><strong>${p.title}</strong> - $${p.price} (Stock: ${p.stock})</p>
                        <button style="background:red; color:white; border:none;" onclick="deleteProduct(${p.id})">Delete</button>
                    </div>`;
            });
            document.getElementById('admin-product-list').innerHTML = html;
        }

        async function addProduct() {
            const title = document.getElementById('title').value;
            const description = document.getElementById('desc').value;
            const price = document.getElementById('price').value;
            const stock = document.getElementById('stock').value;
            const image_url = document.getElementById('image').value;

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ title, description, price, stock, image_url })
            });
            alert('Product Added Successfully!');
            loadAdminProducts();
        }

        async function deleteProduct(id) {
            if(confirm('Are you sure?')) {
                await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                loadAdminProducts();
            }
        }
        loadAdminProducts();
    </script>
    <!-- End of body me bas ye line link karein -->
    <script src="js/app.js"></script>

</body>
</html>
