<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Your Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Shopping Cart</h1><nav><a href="index.html">Home</a></nav></header>
    <main>
        <div id="cart-items"></div>
        <button onclick="checkout()" style="margin-top:20px; padding:10px 20px; background:green; color:white;">Proceed to Checkout (Mock Pay)</button>
    </main>

    <script>
        //const API_URL = "https://your-backend-render-url.onrender.com/api";
        const API_URL = "https://mini-amazon-1vlq.onrender.com/api";
        const token = localStorage.getItem('token');

        async function loadCart() {
            if(!token) return document.getElementById('cart-items').innerText = "Please login to see cart.";
            const res = await fetch(`${API_URL}/cart`, { headers: { 'Authorization': `Bearer ${token}` } });
            const items = await res.json();
            
            let html = '';
            items.forEach(i => {
                html += `<div class="cart-item"><p>${i.title} - $${i.price} x ${i.quantity}</p></div>`;
            });
            document.getElementById('cart-items').innerHTML = html || "<p>Cart is Empty</p>";
        }

        async function checkout() {
            const res = await fetch(`${API_URL}/cart/checkout`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            alert(data.message);
            loadCart();
        }
        loadCart();
    </script>
</body>
</html>

<script>
    const stripe = Stripe('your-publishable-key-from-stripe');

    async function checkout() {
        const res = await fetch(`${API_URL}/cart/create-checkout-session`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const session = await res.json();
        
        // Redirect to Stripe Hosted Checkout
        await stripe.redirectToCheckout({ sessionId: session.id });
    }
</script>
